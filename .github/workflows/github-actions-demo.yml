name: Github Actions Demo 
on: 
  push:
    branches: [main]
    paths-ignore: [.github/**]
  pull_request:
    branches: [main]
  schedule: 
    - cron: '15 6 * * 0'
  workflow_dispatch:
    inputs: 
      environment:
      type: environment
      requried: true
      
jobs:
  build: 
    runs-on: ubuntu-latest 
    steps:
      - name: Triggerd workflow
        run: | 
          echo "🎉 The job was triggered by event: ${{ github.event_name }}"
          echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ."

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: build
    environment: Test
    steps:
      - run: echo "🧪 Testing..."

  load-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: build 
    environment: Load-Test
    steps:
      - run: |
          echo "🧪 Testing..."
          sleep 15

  production:
    runs-on: ubuntu-latest
    needs: [test, load-test]
    environment:
      name: Production
      url: https://writeabout.net
    if: github.event.inputs.environment == 'Production'
    steps:
      - run: |
          echo "🚀 Step 1..."
          sleep 10
      - run: |
          echo "🚀 Step 2..."
          sleep 10
      - run: |
          echo "🚀 Step 3..."
          sleep 10
      - run: |
          echo "🚀 Step 4..."
          sleep 10
      - run: |
          echo "🚀 Step 5..."
          sleep 10
   
   
   
   
    
